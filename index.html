<section id="quote" class="quote-section">
  <div class="section-label">✦ Let's Talk ✦</div>
  <h2>Get Your Customized Free Quote</h2>
  <p class="section-sub">Fill out the form below and we'll get back to you about building your custom package within 24-48 hours.</p>

  <form class="quote-form" action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
    <input type="hidden" name="subject" value="New Casino Party Quote Request">
    <input type="hidden" name="from_name" value="Casino Nights Website">
    <input type="hidden" name="redirect" value="https://YOURDOMAIN.com/thank-you.html">

    <div class="form-row">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" name="name" placeholder="John Smith" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="john@company.com" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+1 (555) 000-0000">
      </div>
      <div class="form-group">
        <label>Event Date</label>
        <input type="date" name="event_date">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Event Type</label>
        <select name="event_type">
          <option value="">Select event type</option>
          <option>Corporate Event</option>
          <option>Fundraiser / Charity</option>
          <option>Private Party</option>
          <option>Wedding</option>
          <option>Birthday Party</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Expected Guest Count</label>
        <select name="guest_count">
          <option value="">Select guest count</option>
          <option>Under 50 guests</option>
          <option>50–100 guests</option>
          <option>100–250 guests</option>
          <option>250–500 guests</option>
          <option>500+ guests</option>
        </select>
      </div>
    </div>

    <div class="form-group full-width">
      <label>Tell Us About Your Event</label>
      <textarea name="message" placeholder="Tell us your vision, venue, any special requests..." rows="5"></textarea>
    </div>

    <button type="submit" class="submit-btn">🎲 Send My Quote Request</button>
    <p class="form-note">We typically respond within a few hours during business hours.</p>
  </form>
</section>
